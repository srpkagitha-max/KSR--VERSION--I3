<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KSR Online Exam Platform</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="top-header">
    <h1>KSR Online Exam Platform</h1>
    <h3>Version L.3 Phase 3.1 - Hall Ticket QR</h3>
    <a href="admin.html" class="admin-link">Admin</a>
  </header>

  <main class="container">
    <section class="card">
      <h2>Student Login</h2>

      <label>Name</label>
      <input type="text" id="studentName" placeholder="Student name" />

      <label>Phone</label>
      <input type="tel" id="studentPhone" placeholder="Phone number" />

      <label>Student Photo URL (optional)</label>
      <input type="text" id="studentPhoto" placeholder="Paste photo link optional" />

      <label>Exam ID</label>
      <input type="text" id="examId" placeholder="DSC001" value="DSC001" />

      <label>Exam Code</label>
      <input type="text" id="examCode" placeholder="Exam code" />

      <div class="btn-row">
        <button id="startExamBtn" class="primary-btn">Start Exam</button>
        <button id="hallTicketBtn" class="secondary-btn">Hall Ticket</button>
      </div>

      <p id="loginMsg"></p>
    </section>
  </main>

  <script src="firebase-config.js"></script>
  <script src="student.js"></script>
</body>
</html>
